# ──────────────────────────────────────────────────────────────────────
# qai chat — example config
#
# Copy to one of:
#   ./qai.toml                   (per-project, takes precedence)
#   ~/.config/qai/config.toml    (per-user fallback)
# Or load explicitly:
#   qai --config=PATH
#
# By default, qai talks directly to upstream providers using each
# provider's API-key env var. Point a per-provider base_url at your
# own backend (e.g. api.quantumencoding.ai) when you want billing +
# capability gating to live server-side and never expose raw provider
# keys on this machine.
#
# Layout qai writes / reads on disk:
#   .qai/approvals                    per-project tool approvals (in cwd)
#   ~/.qai/projects/<sanitized-cwd>/  conversation transcripts (.md)
#   ~/.qai/usage/<sanitized-cwd>.csv  per-(provider,model) cost log
#
# Useful commands inside the REPL (type / for any of these):
#   /help /quit /clear /history /tools /model /provider /approvals
#   /forget /save [PATH] /load PATH /sessions /usage
#
# Top-level subcommand:
#   qai usage [--project=PATH] [--since=YYYYMMDD] [--by-provider]
#
# CLI flags:
#   --provider=NAME   anthropic | openai | gemini | grok | deepseek
#   --model=ID
#   --max-tokens=N
#   --reasoning=LEVEL minimal | low | medium | high | xhigh
#   --tools           enable read_file / ls / grep / write_file / edit_file / bash
#   --yes / -y        auto-approve all writable tool calls (USE CAREFULLY)
# ──────────────────────────────────────────────────────────────────────


# ─── Global defaults ─────────────────────────────────────────────────

# Default provider when no --provider is given.
#   anthropic | openai | gemini | grok | deepseek
provider = "anthropic"

# Default model. Optional — when omitted, qai picks the active provider's
# built-in default (claude-sonnet-4-6 for anthropic, gpt-5.4 for openai,
# grok-4-1-fast-non-reasoning for grok, gemini-2.5-flash for gemini,
# deepseek-chat for deepseek).
# model = "claude-sonnet-4-6"

# Sampling.
max_tokens = 4096
temperature = 1.0

# Reasoning effort for the OpenAI / Grok / xAI GPT-5 family.
# Valid: "minimal" | "low" | "medium" | "high" | "xhigh".
# "low" is fastest valid across gpt-5-mini and gpt-5.4. Anthropic
# and Gemini ignore this field.
reasoning_effort = "low"

# Optional global system prompt. Per-provider overrides below win over
# this. Leave empty for "no system prompt" (the agent loop will inject
# its default tool-use guidance when --tools is on).
system_prompt = ""


# ─── Per-provider routing ────────────────────────────────────────────
#
# Each section sets the base_url, the env var that holds the bearer
# token, and an optional per-provider system_prompt override.
#
# To route through your own backend: replace base_url with your server
# URL and api_key_env with the env var holding a per-user token (so the
# raw provider key never leaves the server).

[anthropic]
base_url = "https://api.anthropic.com"
api_key_env = "ANTHROPIC_API_KEY"
# Example per-provider override — applies only when provider=anthropic.
# system_prompt = "You are a senior Zig engineer. Be terse."

[openai]
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"

[gemini]
base_url = "https://generativelanguage.googleapis.com/v1beta"
api_key_env = "GEMINI_API_KEY"

[grok]
base_url = "https://api.x.ai/v1"
api_key_env = "XAI_API_KEY"

[deepseek]
base_url = "https://api.deepseek.com/anthropic"
api_key_env = "DEEPSEEK_API_KEY"
# DeepSeek complies with the input language by default — when prompts are
# in English it answers in English. Set this if you want to force English
# for non-English prompts as well. Per-provider system_prompt wins over
# the global one.
system_prompt = "Always respond in English. Be concise."


# ─── Routing through your own backend ────────────────────────────────
#
# To consolidate billing + key custody on a server, point a provider's
# base_url at the server and use a per-user token instead of the
# upstream key. Example:
#
#   [anthropic]
#   base_url = "https://api.quantumencoding.ai/qai/v1/proxy/anthropic"
#   api_key_env = "QAI_TOKEN"
#
# The wire format must match the upstream provider's (Anthropic v1 here).
# Backend mode for the unified /qai/v1/agent endpoint with multi-provider
# tool calling is on the roadmap — track via task #21.
